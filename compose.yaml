services:
  postgres:
    image: postgres:17-alpine

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 10

    ports:
      - "54321:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dbmate

    image: flights-migrations:0.1.0

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable

    command: up

  migrate-test:
    image: flights-migrations:0.1.0

    depends_on:
      migrate:
        condition: service_completed_successfully

    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_TEST}?sslmode=disable

    command: up

  api:
    build:
      context: .
      dockerfile: Dockerfile

    image: flights-image:0.1.0

    depends_on:
      migrate-test:
        condition: service_completed_successfully

    ports:
      - "5005:80"

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB_TEST: ${POSTGRES_DB_TEST}

    volumes:
      - ./src:/app/src
      - ./tests:/app/tests

volumes:
  postgres_data: